name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Keep this at job level so Prisma config works in every step and release
      # commits do not show a red GitHub X for a missing DATABASE_URL.
      DATABASE_URL: file:./ci-test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --max-warnings=100
        continue-on-error: true

      - name: Unit Tests
        run: npm test

      # Next build already runs the app-level TypeScript check with the same
      # Next.js pipeline used in production. A standalone `tsc --noEmit` in this
      # repo currently reports false positives with Prisma + bundler resolution
      # and would make otherwise valid release commits show a red GitHub X.
      - name: Build
        run: npm run build
